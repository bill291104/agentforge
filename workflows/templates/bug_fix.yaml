name: bug_fix
version: "1.0"
tasks:
  - id: diagnose
    title: "버그 진단"
    description: "버그 재현 방법을 확인하고 근본 원인을 분석한다."
    model_tier: sonnet
    timeout_minutes: 20
    priority: 1
    acceptance_criteria:
      - "버그 재현 시나리오가 문서화되었다"
      - "근본 원인이 식별되었다"

  - id: fix
    title: "버그 수정"
    description: "진단 결과를 바탕으로 코드를 수정한다."
    model_tier: haiku
    timeout_minutes: 30
    priority: 2
    depends_on: [diagnose]
    acceptance_criteria:
      - "수정된 파일이 명시되었다"
      - "버그가 재현되지 않는다"

  - id: regression_test
    title: "회귀 테스트"
    description: "수정이 기존 기능을 깨뜨리지 않음을 확인한다."
    model_tier: haiku
    timeout_minutes: 20
    priority: 3
    depends_on: [fix]
    acceptance_criteria:
      - "전체 테스트 스위트가 통과한다"
      - "수정 관련 테스트 케이스가 추가되었다"
